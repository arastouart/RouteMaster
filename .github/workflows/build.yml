name: build

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build:
    name: Compile + logic tests (LOCAL_DEV, unsigned)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          uname -m

      # Pin XcodeGen to a fixed release so CI does not silently pull a newer version
      # that defaults to a future pbxproj format. (project.yml also pins objectVersion:56,
      # so the format is correct even if this step changes — belt and suspenders.)
      - name: Install XcodeGen (pinned)
        env:
          XCODEGEN_VERSION: "2.42.0"
        run: |
          set -euo pipefail
          curl -fsSL -o xcodegen.zip \
            "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          unzip -q xcodegen.zip -d xcodegen-dist
          # Locate bin/xcodegen wherever the portable zip placed it; its resources live in
          # the sibling ../share/xcodegen, so adding this bin dir to PATH is sufficient.
          XG_BIN="$(find "${PWD}/xcodegen-dist" -type f -name xcodegen -path '*/bin/*' | head -n1)"
          test -n "${XG_BIN}"
          chmod +x "${XG_BIN}"
          echo "$(dirname "${XG_BIN}")" >> "${GITHUB_PATH}"

      - name: Verify XcodeGen version
        run: xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Assert Xcode 15-compatible project format (objectVersion <= 56)
        run: |
          set -euo pipefail
          OBJV=$(grep -m1 'objectVersion' RouteMaster.xcodeproj/project.pbxproj | grep -oE '[0-9]+')
          echo "objectVersion=${OBJV}"
          # Xcode 15.4 opens the classic formats (54/55/56, and older). It only chokes
          # on the future format (e.g. 77). Anything <= 56 is fine; lower is MORE
          # compatible, not less. Fail only on newer-than-56 formats.
          if [ "${OBJV}" -le 56 ]; then
            echo "OK: objectVersion ${OBJV} is Xcode 15.4-compatible."
          else
            echo "ERROR: objectVersion ${OBJV} is a future format Xcode 15.4 cannot open." >&2
            exit 1
          fi

      - name: List targets
        run: xcodebuild -list -project RouteMaster.xcodeproj

      # Prove BOTH targets compile and the helper embeds. Signing is disabled here
      # (CI has no keychain identity); real builds sign via scripts/build.sh.
      - name: Build (Release, code signing disabled)
        run: |
          xcodebuild \
            -project RouteMaster.xcodeproj \
            -scheme RouteMaster \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Verify embedded helper layout
        run: |
          APP="build/Build/Products/Release/RouteMaster.app"
          test -f "$APP/Contents/MacOS/RouteMasterHelper"
          test -f "$APP/Contents/Library/LaunchDaemons/com.routemaster.helper.plist"
          echo "Embedded helper + launchd plist present."

      - name: Run logic tests
        run: |
          xcodebuild \
            -project RouteMaster.xcodeproj \
            -scheme RouteMaster \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            test
